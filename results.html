<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oche Ness Monsters | Results & Stats</title>
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/results.css">
  <link rel="stylesheet" href="styles/profile.css" />
  <link rel="icon" type="image/png" href="/graphics/favicon1.png" sizes="32x32">
  <meta property="og:title" content="Oche Ness Monsters">
  <meta property="og:description" content="London based darts team">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ochenessmonsters.com">
  <meta property="og:image" content="https://i.ibb.co/FbGDQDjq/ONMmeta.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
</head>

<body>
  <header class="site-header">
    <a href="/" class="brand-left">
      <img class="top-left-logo" src="graphics/logoWText.png" alt="Oche Ness Monsters">
    </a>

    <img class="logo" src="graphics/onmLogoWhiteFit.png" alt="Oche Ness Monsters">

    <nav class="nav-links desktop-nav">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="comps.html">Comps</a></li>
        <li><a href="results.html" class="active">Results & Stats</a></li>
        <li><a href="players-landing.html">Players</a></li>
        <li><a href="games.html">Games</a></li>
      </ul>
    </nav>

    <button id="authNavBtn" type="button" class="authProfileBtn">
      <span class="authProfileInitial">👤</span>
    </button>

    <button class="hamburger" type="button" onclick="toggleSidebar()">☰</button>
  </header>

  <div id="sidebar" class="sidebar">
    <button class="close-btn" type="button" onclick="toggleSidebar()">✖</button>

    <a href="/">Home</a>
    <a href="comps.html">Comps</a>
    <a href="results.html" class="active">Results & Stats</a>
    <a href="players-landing.html">Players</a>
    <a href="games.html">Games</a>
  </div>

  <section class="results-container">
    <div class="results-header-bar">
      <div class="season-selector">
        <button class="season-tab active" data-season="25-26" title="25/26 season">25/26</button>
        <button class="season-tab" data-season="24-25" title="24/25 season">24/25</button>
      </div>

      <h2 class="results-title">Match Results 25/26</h2>

      <div class="view-selector">
        <button class="view-btn active" data-view="results" title="Result view">🧾</button>
        <button class="view-btn" data-view="stats" title="Stats view">📊</button>
        <button class="view-btn" data-view="gallery" title="Gallery view">🖼️</button>
      </div>

      <h2 class="results-title2">Match Results 25/26</h2>
    </div>


    <div id="leagueFilterBar"></div>
    <div id="resultsGrid" class="results-grid view active"></div>
    <div id="galleryGrid" class="gallery-grid view" style="display:none;"></div>
    <div id="statsGrid" class="stats-grid view" style="display:none;"></div>


  </section>

  <div class="lightbox" onclick="handleLightboxClick(event)">
    <div class="lightbox-content">
      <button class="lightbox-prev" onclick="prevImage()">❮</button>
      <div class="lightbox-info-top"></div>

      <img class="lightbox-img" src="" alt="Match image">
      <div class="lightbox-spinner" aria-hidden="true"></div> <!-- ✅ ADD THIS -->

      <div class="lightbox-info-bottom"></div>
      <button class="lightbox-next" onclick="nextImage()">❯</button>
    </div>
  </div>

  </main>
  <script src="scripts/results.js"></script>
  <script src="scripts/player-data.js"></script>
  <script src="scripts/session.js"></script>
  <script src="scripts/profile.js"></script>
  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("active");
    }
    document.querySelectorAll("#sidebar a").forEach(a => {
      a.addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("active");
      });
    });
  </script>
</body>

</html>
