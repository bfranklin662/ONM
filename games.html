<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oche Ness Monsters | Games</title>

  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/buttons.css">
  <link rel="stylesheet" href="styles/dart-scorer.css">
  <link rel="stylesheet" href="styles/profile.css">
  <link rel="stylesheet" href="styles/games.css">
  <link rel="icon" type="image/png" href="/graphics/favicon1.png" sizes="32x32">

  <meta property="og:title" content="Oche Ness Monsters">
  <meta property="og:description" content="London based darts team">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ochenessmonsters.com">
  <meta property="og:image" content="https://i.ibb.co/FbGDQDjq/ONMmeta.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
</head>

<body>
  <header class="site-header">
    <a href="/" class="brand-left">
      <img class="top-left-logo" src="graphics/logoWText.png" alt="Oche Ness Monsters">
    </a>

    <img class="logo" src="graphics/onmLogoWhiteFit.png" alt="Oche Ness Monsters">

    <nav class="nav-links desktop-nav">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="comps.html">Comps</a></li>
        <li><a href="results.html">Results & Stats</a></li>
        <li><a href="players-landing.html">Players</a></li>
        <li><a href="games.html" class="active">Games</a></li>
      </ul>
    </nav>

    <button id="authNavBtn" type="button" class="authProfileBtn">
      <span class="authProfileInitial">👤</span>
    </button>

    <button class="hamburger" type="button" onclick="toggleSidebar()">☰</button>
  </header>

  <div id="sidebar" class="sidebar">
    <button class="close-btn" type="button" onclick="toggleSidebar()">✖</button>

    <a href="/">Home</a>
    <a href="comps.html">Comps</a>
    <a href="results.html">Results & Stats</a>
    <a href="players-landing.html">Players</a>
    <a href="games.html" class="active">Games</a>
  </div>

  <main class="wrap">
    <div class="header appSwitcher" id="appHeader">
      <div>
        <div class="title" id="screenTitleText">Games</div>
      </div>
    </div>

    <section class="scorerSetupCard">
      <div class="setupGrid">
        <div class="sectionTitle">Choose a game</div>

        <a href="dart-scorer.html" class="gameTile">
          <div>
            <h2>Dart Scorer</h2>
            <p>Play and track legs, averages, checkouts, 180s and bull-outs.</p>
          </div>
          <span>Play →</span>
        </a>

        <a href="fines.html" class="gameTile">
          <div>
            <h2>Fine Tracker</h2>
            <p>Track match fines, 180s, bulls, ton-outs and weekly damage.</p>
          </div>
          <span>Open →</span>
        </a>
      </div>
    </section>
  </main>

  <div id="profileOverlay" class="modalOverlay hidden" aria-hidden="true">
    <div class="modalCard profileModalCard">
      <div class="modalHeader">
        <div class="modalTitle">Profile</div>
        <button id="closeProfileBtn" class="modalClose" type="button">✕</button>
      </div>

      <div class="modalBody">
        <div id="profileModalContent"></div>
      </div>
    </div>
  </div>

  <script src="scripts/player-data.js"></script>
  <script src="scripts/session.js"></script>
  <script src="scripts/profile.js"></script>

  <script>
    function toggleSidebar() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("active");
    }

    document.querySelectorAll("#sidebar a").forEach(a => {
      a.addEventListener("click", () => {
        document.getElementById("sidebar").classList.remove("active");
      });
    });
  </script>
</body>

</html>
